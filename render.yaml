services:
  - type: web
    name: can-challenge-api
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server build
    startCommand: pnpm --filter @workspace/api-server start
    healthCheckPath: /api/healthz
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false

  - type: static_site
    name: can-challenge-web
    plan: free
    buildCommand: pnpm install --frozen-lockfile && PORT=10000 BASE_PATH=/ pnpm --filter @workspace/cancha-llena build
    staticPublishPath: artifacts/cancha-llena/dist/public
    envVars:
      - key: VITE_API_URL
        sync: false
