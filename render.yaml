services:
  - type: web
    name: tribuna
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist-server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER_EXTERNAL_URL
        value: https://tribuna-8b8r.onrender.com
