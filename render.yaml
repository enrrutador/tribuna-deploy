services:
  - type: web
    name: tribuna
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node -e "import('./dist-server/index.js').catch(e=>{console.error('STARTUP FAILED:',e.message);console.error(e.stack);process.exit(1)})"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
