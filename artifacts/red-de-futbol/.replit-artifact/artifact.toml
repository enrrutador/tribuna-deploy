kind = "web"
previewPath = "/"
title = "Red de Fútbol"
version = "1.0.0"
id = "artifacts/red-de-futbol"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25639

[services.development]
run = "pnpm --filter @workspace/red-de-futbol run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/red-de-futbol", "run", "build" ]
publicDir = "artifacts/red-de-futbol/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25639"
BASE_PATH = "/"
