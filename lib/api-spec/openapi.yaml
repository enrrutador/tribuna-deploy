openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Cancha Llena football scores app
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tournaments
    description: Tournament operations
  - name: matches
    description: Match operations
  - name: teams
    description: Team operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tournaments:
    get:
      operationId: listTournaments
      tags: [tournaments]
      summary: List all tournaments grouped by category
      responses:
        "200":
          description: List of tournaments grouped by category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentsGrouped"

  /tournaments/{id}:
    get:
      operationId: getTournament
      tags: [tournaments]
      summary: Get a tournament by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tournament detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"
        "404":
          description: Not found

  /tournaments/by-slug/{slug}:
    get:
      operationId: getTournamentBySlug
      tags: [tournaments]
      summary: Get a tournament by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tournament detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"
        "404":
          description: Not found

  /tournaments/{id}/standings:
    get:
      operationId: getTournamentStandings
      tags: [tournaments]
      summary: Get standings table for a tournament
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Standings table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandingsResponse"

  /tournaments/{id}/scorers:
    get:
      operationId: getTournamentScorers
      tags: [tournaments]
      summary: Get top scorers for a tournament
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Top scorers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScorersResponse"

  /tournaments/{id}/fixtures:
    get:
      operationId: getTournamentFixtures
      tags: [tournaments]
      summary: Get all fixtures/matches for a tournament
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: round
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Matches for the tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchesGrouped"

  /matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List matches with optional filters
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [upcoming, live, finished]
        - name: tournamentId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of matches grouped by tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchesGrouped"

  /matches/today:
    get:
      operationId: getTodayMatches
      tags: [matches]
      summary: Get today's matches grouped by tournament
      responses:
        "200":
          description: Today's matches grouped by tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodaySummary"

  /matches/live:
    get:
      operationId: getLiveMatches
      tags: [matches]
      summary: Get all currently live matches
      responses:
        "200":
          description: Live matches grouped by tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchesGrouped"

  /matches/{id}:
    get:
      operationId: getMatch
      tags: [matches]
      summary: Get a single match by ID with events
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Match detail with events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchDetail"
        "404":
          description: Not found

  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List all teams
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamsListResponse"

  /teams/{id}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get a team by ID with recent matches
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team detail with recent matches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamDetailResponse"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Tournament:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        category:
          type: string
          enum: [destacados, argentina, world]
        logoUrl:
          type: string
          nullable: true
        flagEmoji:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        currentChampion:
          type: string
          nullable: true
        format:
          type: string
          nullable: true
        participantCount:
          type: integer
          nullable: true
      required:
        - id
        - name
        - slug
        - category

    TournamentsGrouped:
      type: object
      properties:
        destacados:
          type: array
          items:
            $ref: "#/components/schemas/Tournament"
        argentina:
          type: array
          items:
            $ref: "#/components/schemas/Tournament"
        world:
          type: array
          items:
            $ref: "#/components/schemas/Tournament"
      required:
        - destacados
        - argentina
        - world

    Team:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        logoUrl:
          type: string
          nullable: true
        shortName:
          type: string
          nullable: true
      required:
        - id
        - name

    TeamDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        shortName:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        slug:
          type: string
          nullable: true
        stadium:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        founded:
          type: integer
          nullable: true
        coach:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
      required:
        - id
        - name

    TeamDetailResponse:
      type: object
      properties:
        team:
          $ref: "#/components/schemas/TeamDetail"
        recentMatches:
          type: array
          items:
            $ref: "#/components/schemas/Match"
      required:
        - team
        - recentMatches

    TeamsListResponse:
      type: object
      properties:
        teams:
          type: array
          items:
            $ref: "#/components/schemas/TeamDetail"
      required:
        - teams

    MatchEvent:
      type: object
      properties:
        id:
          type: integer
        eventType:
          type: string
          enum: [goal, owngoal, yellow_card, red_card, substitution, penalty, penalty_miss, var_review]
        minute:
          type: integer
        playerName:
          type: string
          nullable: true
        assistName:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        teamId:
          type: integer
          nullable: true
        teamName:
          type: string
          nullable: true
      required:
        - id
        - eventType
        - minute

    Match:
      type: object
      properties:
        id:
          type: integer
        homeTeam:
          $ref: "#/components/schemas/Team"
        awayTeam:
          $ref: "#/components/schemas/Team"
        homeScore:
          type: integer
          nullable: true
        awayScore:
          type: integer
          nullable: true
        kickoffTime:
          type: string
        status:
          type: string
          enum: [upcoming, live, finished]
        minute:
          type: integer
          nullable: true
        tournamentId:
          type: integer
        tournamentName:
          type: string
        round:
          type: string
          nullable: true
        date:
          type: string
        broadcastChannel:
          type: string
          nullable: true
      required:
        - id
        - homeTeam
        - awayTeam
        - kickoffTime
        - status
        - tournamentId
        - tournamentName
        - date

    MatchDetail:
      allOf:
        - $ref: "#/components/schemas/Match"
        - type: object
          properties:
            events:
              type: array
              items:
                $ref: "#/components/schemas/MatchEvent"
          required:
            - events

    TournamentMatches:
      type: object
      properties:
        tournament:
          $ref: "#/components/schemas/Tournament"
        round:
          type: string
          nullable: true
        matches:
          type: array
          items:
            $ref: "#/components/schemas/Match"
      required:
        - tournament
        - matches

    MatchesGrouped:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/TournamentMatches"
        totalMatches:
          type: integer
        liveCount:
          type: integer
      required:
        - groups
        - totalMatches
        - liveCount

    TodaySummary:
      type: object
      properties:
        date:
          type: string
        groups:
          type: array
          items:
            $ref: "#/components/schemas/TournamentMatches"
        totalMatches:
          type: integer
        liveCount:
          type: integer
        finishedCount:
          type: integer
        upcomingCount:
          type: integer
      required:
        - date
        - groups
        - totalMatches
        - liveCount
        - finishedCount
        - upcomingCount

    StandingRow:
      type: object
      properties:
        position:
          type: integer
        team:
          $ref: "#/components/schemas/Team"
        played:
          type: integer
        won:
          type: integer
        drawn:
          type: integer
        lost:
          type: integer
        goalsFor:
          type: integer
        goalsAgainst:
          type: integer
        goalDifference:
          type: integer
        points:
          type: integer
        form:
          type: string
          nullable: true
          description: Last 5 results e.g. "WWDLW"
      required:
        - position
        - team
        - played
        - won
        - drawn
        - lost
        - goalsFor
        - goalsAgainst
        - goalDifference
        - points

    StandingsResponse:
      type: object
      properties:
        tournament:
          $ref: "#/components/schemas/Tournament"
        standings:
          type: array
          items:
            $ref: "#/components/schemas/StandingRow"
        round:
          type: string
          nullable: true
      required:
        - tournament
        - standings

    ScorerEntry:
      type: object
      properties:
        position:
          type: integer
        player:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            nationality:
              type: string
              nullable: true
          required:
            - id
            - name
        team:
          $ref: "#/components/schemas/Team"
        goals:
          type: integer
        assists:
          type: integer
        played:
          type: integer
      required:
        - position
        - player
        - team
        - goals
        - assists
        - played

    ScorersResponse:
      type: object
      properties:
        tournament:
          $ref: "#/components/schemas/Tournament"
        scorers:
          type: array
          items:
            $ref: "#/components/schemas/ScorerEntry"
      required:
        - tournament
        - scorers
