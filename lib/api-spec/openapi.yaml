openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Red de Fútbol football scores app
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tournaments
    description: Tournament operations
  - name: matches
    description: Match operations
  - name: teams
    description: Team operations
  - name: players
    description: Player operations (Sofascore + Transfermarkt)
  - name: squads
    description: Squad operations
  - name: lineups
    description: Match lineups and H2H
  - name: news
    description: News from Argentine sports media
  - name: transfers
    description: Transfer market data
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tournaments:
    get:
      operationId: listTournaments
      tags: [tournaments]
      summary: List all tournaments grouped by category
      responses:
        "200":
          description: List of tournaments grouped by category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentsGrouped"

  /tournaments/{id}:
    get:
      operationId: getTournament
      tags: [tournaments]
      summary: Get a tournament by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Tournament detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"
        "404":
          description: Not found

  /tournaments/by-slug/{slug}:
    get:
      operationId: getTournamentBySlug
      tags: [tournaments]
      summary: Get a tournament by slug
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Tournament detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"
        "404":
          description: Not found

  /tournaments/{id}/standings:
    get:
      operationId: getTournamentStandings
      tags: [tournaments]
      summary: Get standings table for a tournament
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Standings table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandingsResponse"

  /tournaments/{id}/scorers:
    get:
      operationId: getTournamentScorers
      tags: [tournaments]
      summary: Get top scorers for a tournament
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Top scorers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScorersResponse"

  /tournaments/{id}/fixtures:
    get:
      operationId: getTournamentFixtures
      tags: [tournaments]
      summary: Get all fixtures/matches for a tournament
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: round
        in: query
        required: false
        schema:
          type: string
      - name: dates
        in: query
        required: false
        schema:
          type: string
        description: Date range (YYYYMMDD-YYYYMMDD) or single date
      responses:
        "200":
          description: Matches for the tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchesGrouped"

  /matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List matches with optional filters
      parameters:
      - name: date
        in: query
        required: false
        schema:
          type: string
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum: [upcoming, live, finished]
      - name: tournamentId
        in: query
        required: false
        schema:
          type: integer
      responses:
        "200":
          description: List of matches grouped by tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchesGrouped"

  /matches/today:
    get:
      operationId: getTodayMatches
      tags: [matches]
      summary: Get today's matches grouped by tournament
      responses:
        "200":
          description: Today's matches grouped by tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodaySummary"

  /matches/live:
    get:
      operationId: getLiveMatches
      tags: [matches]
      summary: Get all currently live matches
      responses:
        "200":
          description: Live matches grouped by tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchesGrouped"

  /matches/{id}:
    get:
      operationId: getMatch
      tags: [matches]
      summary: Get a single match by ID with events
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Match detail with events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchDetail"
        "404":
          description: Not found

  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List all teams
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamsListResponse"

  /teams/{id}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get a team by ID with recent matches
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Team detail with recent matches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamDetailResponse"
        "404":
          description: Not found

  /players/search:
    get:
      operationId: searchPlayers
      tags: [players]
      summary: Search for players by name
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerSearchResponse"

  /players/{id}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get player profile with stats
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Player detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerDetailResponse"
        "404":
          description: Not found

  /players/{id}/stats:
    get:
      operationId: getPlayerStats
      tags: [players]
      summary: Get player statistics
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: seasonId
        in: query
        required: false
        schema:
          type: integer
      responses:
        "200":
          description: Player stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  stats:
                    $ref: "#/components/schemas/SofaPlayerStats"

  /players/{id}/transfers:
    get:
      operationId: getPlayerTransfers
      tags: [players]
      summary: Get player transfer history from Transfermarkt
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: slug
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: Player transfers
          content:
            application/json:
              schema:
                type: object
                properties:
                  transfers:
                    type: array
                    items:
                      $ref: "#/components/schemas/TmTransfer"

  /squads/{teamId}:
    get:
      operationId: getTeamSquad
      tags: [squads]
      summary: Get team squad from Sofascore or Transfermarkt
      parameters:
      - name: teamId
        in: path
        required: true
        schema:
          type: string
      - name: source
        in: query
        required: false
        schema:
          type: string
          enum: [sofascore, transfermarkt]
          default: sofascore
      responses:
        "200":
          description: Squad
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SquadResponse"

  /lineups/{eventId}:
    get:
      operationId: getMatchLineups
      tags: [lineups]
      summary: Get match lineups from Sofascore
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Match lineups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchLineups"
        "404":
          description: Lineups not available

  /lineups/h2h/{team1Id}/{team2Id}:
    get:
      operationId: getH2H
      tags: [lineups]
      summary: Get head-to-head between two teams
      parameters:
      - name: team1Id
        in: path
        required: true
        schema:
          type: integer
      - name: team2Id
        in: path
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: H2H matches
          content:
            application/json:
              schema:
                type: object
                properties:
                  matches:
                    type: array
                    items:
                      $ref: "#/components/schemas/H2HMatch"
                  total:
                    type: integer

  /news:
    get:
      operationId: getNews
      tags: [news]
      summary: Get football news from Argentine sports media
      parameters:
      - name: source
        in: query
        required: false
        schema:
          type: string
          enum: [all, rss, tyc, ole]
          default: all
      responses:
        "200":
          description: News articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsResponse"

  /transfers:
    get:
      operationId: getTransfers
      tags: [transfers]
      summary: Get transfer market data from Transfermarkt
      parameters:
      - name: league
        in: query
        required: false
        schema:
          type: string
          default: argentina
      - name: season
        in: query
        required: false
        schema:
          type: string
          default: "2025"
      responses:
        "200":
          description: Transfers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransfersResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Tournament:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        category:
          type: string
          enum: [destacados, argentina, sudamerica, world]
        logoUrl:
          type: string
          nullable: true
        flagEmoji:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        currentChampion:
          type: string
          nullable: true
        format:
          type: string
          nullable: true
        participantCount:
          type: integer
          nullable: true
      required:
        - id
        - name
        - slug
        - category

    TournamentsGrouped:
      type: object
      properties:
        destacados:
          type: array
          items:
            $ref: "#/components/schemas/Tournament"
        argentina:
          type: array
          items:
            $ref: "#/components/schemas/Tournament"
        sudamerica:
          type: array
          items:
            $ref: "#/components/schemas/Tournament"
        world:
          type: array
          items:
            $ref: "#/components/schemas/Tournament"
      required:
        - destacados
        - argentina
        - sudamerica
        - world

    Team:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        logoUrl:
          type: string
          nullable: true
        shortName:
          type: string
          nullable: true
      required:
        - id
        - name

    TeamDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        shortName:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        slug:
          type: string
          nullable: true
        stadium:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        founded:
          type: integer
          nullable: true
        coach:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
      required:
        - id
        - name

    TeamDetailResponse:
      type: object
      properties:
        team:
          $ref: "#/components/schemas/TeamDetail"
        recentMatches:
          type: array
          items:
            $ref: "#/components/schemas/Match"
      required:
        - team
        - recentMatches

    TeamsListResponse:
      type: object
      properties:
        teams:
          type: array
          items:
            $ref: "#/components/schemas/TeamDetail"
      required:
        - teams

    MatchEvent:
      type: object
      properties:
        id:
          type: integer
        eventType:
          type: string
          enum: [goal, owngoal, yellow_card, red_card, substitution, penalty, penalty_miss, var_review]
        minute:
          type: integer
        playerName:
          type: string
          nullable: true
        assistName:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        teamId:
          type: integer
          nullable: true
        teamName:
          type: string
          nullable: true
      required:
        - id
        - eventType
        - minute

    Match:
      type: object
      properties:
        id:
          type: integer
        homeTeam:
          $ref: "#/components/schemas/Team"
        awayTeam:
          $ref: "#/components/schemas/Team"
        homeScore:
          type: integer
          nullable: true
        awayScore:
          type: integer
          nullable: true
        kickoffTime:
          type: string
        status:
          type: string
          enum: [upcoming, live, finished]
        minute:
          type: integer
          nullable: true
        tournamentId:
          type: integer
        tournamentName:
          type: string
        tournamentSlug:
          type: string
          nullable: true
        tournamentFlagEmoji:
          type: string
          nullable: true
        round:
          type: string
          nullable: true
        date:
          type: string
        broadcastChannel:
          type: string
          nullable: true
      required:
        - id
        - homeTeam
        - awayTeam
        - kickoffTime
        - status
        - tournamentId
        - tournamentName
        - date

    MatchDetail:
      allOf:
        - $ref: "#/components/schemas/Match"
        - type: object
          properties:
            events:
              type: array
              items:
                $ref: "#/components/schemas/MatchEvent"
          required:
            - events

    TournamentMatches:
      type: object
      properties:
        tournament:
          $ref: "#/components/schemas/Tournament"
        round:
          type: string
          nullable: true
        matches:
          type: array
          items:
            $ref: "#/components/schemas/Match"
      required:
        - tournament
        - matches

    MatchesGrouped:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/TournamentMatches"
        totalMatches:
          type: integer
        liveCount:
          type: integer
      required:
        - groups
        - totalMatches
        - liveCount

    TodaySummary:
      type: object
      properties:
        date:
          type: string
        groups:
          type: array
          items:
            $ref: "#/components/schemas/TournamentMatches"
        totalMatches:
          type: integer
        liveCount:
          type: integer
        finishedCount:
          type: integer
        upcomingCount:
          type: integer
      required:
        - date
        - groups
        - totalMatches
        - liveCount
        - finishedCount
        - upcomingCount

    StandingRow:
      type: object
      properties:
        position:
          type: integer
        team:
          $ref: "#/components/schemas/Team"
        played:
          type: integer
        won:
          type: integer
        drawn:
          type: integer
        lost:
          type: integer
        goalsFor:
          type: integer
        goalsAgainst:
          type: integer
        goalDifference:
          type: integer
        points:
          type: integer
        form:
          type: string
          nullable: true
          description: Last 5 results e.g. "WWDLW"
      required:
        - position
        - team
        - played
        - won
        - drawn
        - lost
        - goalsFor
        - goalsAgainst
        - goalDifference
        - points

    StandingsResponse:
      type: object
      properties:
        tournament:
          $ref: "#/components/schemas/Tournament"
        standings:
          type: array
          items:
            $ref: "#/components/schemas/StandingRow"
        round:
          type: string
          nullable: true
      required:
        - tournament
        - standings

    ScorerEntry:
      type: object
      properties:
        position:
          type: integer
        player:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            nationality:
              type: string
              nullable: true
          required:
            - id
            - name
        team:
          $ref: "#/components/schemas/Team"
        goals:
          type: integer
        assists:
          type: integer
        played:
          type: integer
      required:
        - position
        - player
        - team
        - goals
        - assists
        - played

    ScorersResponse:
      type: object
      properties:
        tournament:
          $ref: "#/components/schemas/Tournament"
        scorers:
          type: array
          items:
            $ref: "#/components/schemas/ScorerEntry"
      required:
        - tournament
        - scorers

    SofaPlayer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        nationality:
          type: string
        nationalityCode:
          type: string
        position:
          type: string
          enum: [GK, DEF, MID, FWD]
        dateOfBirth:
          type: string
          nullable: true
        height:
          type: number
          nullable: true
        preferredFoot:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        team:
          $ref: "#/components/schemas/SofaTeamRef"
        marketValue:
          type: number
          nullable: true
      required:
        - id
        - name
        - slug
        - position

    SofaTeamRef:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        imageUrl:
          type: string
          nullable: true
      required:
        - id
        - name

    SofaPlayerStats:
      type: object
      properties:
        rating:
          type: number
          nullable: true
        appearances:
          type: integer
        goals:
          type: integer
        assists:
          type: integer
        yellowCards:
          type: integer
        redCards:
          type: integer
        minutesPlayed:
          type: integer
        averageRating:
          type: number
          nullable: true
        cleanSheets:
          type: integer
          nullable: true
        saves:
          type: integer
          nullable: true
        tackles:
          type: integer
          nullable: true
        interceptions:
          type: integer
          nullable: true
        passes:
          type: integer
          nullable: true
        passAccuracy:
          type: number
          nullable: true
        keyPasses:
          type: integer
          nullable: true
        shots:
          type: integer
          nullable: true
        shotsOnTarget:
          type: integer
          nullable: true
        dribbles:
          type: integer
          nullable: true
      required:
        - appearances
        - goals
        - assists

    PlayerSearchResponse:
      type: object
      properties:
        players:
          type: array
          items:
            $ref: "#/components/schemas/SofaPlayer"
      required:
        - players

    PlayerDetailResponse:
      type: object
      properties:
        player:
          $ref: "#/components/schemas/SofaPlayer"
        stats:
          $ref: "#/components/schemas/SofaPlayerStats"
      required:
        - player

    LineupPlayer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        position:
          type: string
        rating:
          type: number
          nullable: true
        shirtNumber:
          type: integer
          nullable: true
        imageUrl:
          type: string
          nullable: true
      required:
        - id
        - name
        - position

    Lineup:
      type: object
      properties:
        formation:
          type: string
          nullable: true
        players:
          type: array
          items:
            $ref: "#/components/schemas/LineupPlayer"
      required:
        - players

    MatchLineups:
      type: object
      properties:
        home:
          $ref: "#/components/schemas/Lineup"
        away:
          $ref: "#/components/schemas/Lineup"
      required:
        - home
        - away

    H2HMatch:
      type: object
      properties:
        id:
          type: integer
        homeTeam:
          $ref: "#/components/schemas/SofaTeamRef"
        awayTeam:
          $ref: "#/components/schemas/SofaTeamRef"
        homeScore:
          type: integer
          nullable: true
        awayScore:
          type: integer
          nullable: true
        tournament:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
          nullable: true
        startTime:
          type: string
      required:
        - id
        - homeTeam
        - awayTeam
        - startTime

    NewsArticle:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        summary:
          type: string
        url:
          type: string
        imageUrl:
          type: string
          nullable: true
        source:
          type: string
        sourceIcon:
          type: string
          nullable: true
        publishedAt:
          type: string
        category:
          type: string
        isFeatured:
          type: boolean
      required:
        - id
        - title
        - url
        - source
        - publishedAt

    NewsResponse:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/NewsArticle"
        total:
          type: integer
      required:
        - articles
        - total

    TmSquadPlayer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        position:
          type: string
        age:
          type: integer
          nullable: true
        nationality:
          type: string
        marketValue:
          type: string
        marketValueNum:
          type: number
          nullable: true
        imageUrl:
          type: string
          nullable: true
        shirtNumber:
          type: integer
          nullable: true
      required:
        - id
        - name
        - position

    TmTeamInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        country:
          type: string
          nullable: true
        marketValue:
          type: string
          nullable: true
        squadSize:
          type: integer
          nullable: true
        averageAge:
          type: number
          nullable: true
        foreigners:
          type: integer
          nullable: true
        stadium:
          type: string
          nullable: true
        capacity:
          type: integer
          nullable: true
        founded:
          type: integer
          nullable: true
        coach:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
      required:
        - id
        - name

TmTransfer:
  type: object
  properties:
    id:
      type: string
    playerName:
      type: string
    playerSlug:
      type: string
    playerImageUrl:
      type: string
      nullable: true
    fromTeam:
      type: string
    fromTeamId:
      type: string
      nullable: true
